<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Programa mensual · Villa Fiad</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <link rel="stylesheet" href="css/styles.css" />

  <style>
    /* Programa mensual estilo "tabla" (como el modelo) */
    .pm-wrap{max-width:820px;margin:0 auto;}
    .month-banner{border:1px solid #888;border-bottom:none;border-radius:0;overflow:hidden}
    .month-banner img{display:block;width:100%;height:140px;object-fit:cover}
    .month-banner .meta{
      display:flex;justify-content:space-between;align-items:center;
      background:#d8d6e8;
      border-top:1px solid #888;border-bottom:1px solid #888;
      padding:6px 8px;font-weight:700;font-size:13px;
    }
    .month-banner .meta .right{font-weight:600}
    .model-block{border-left:1px solid #888;border-right:1px solid #888;border-bottom:1px solid #888}
    .model-block + .model-block{border-top:none}
    .dia-head{
      text-align:center;
      font-weight:800;
      padding:7px 8px;
      border-bottom:1px solid #888;
      letter-spacing:.2px;
    }
    .model-table{width:100%;border-collapse:collapse}
    .model-table td{
      border:1px solid #888;
      padding:4px 6px;
      font-size:12px;
      vertical-align:middle;
    }
    .model-table td.lbl{
      font-weight:700;
      background:#f3f4f6;
      width:18%;
      white-space:nowrap;
    }
    .model-table td.val{width:32%;}
    .model-table td.title{
      text-align:center;
      font-style:italic;
      font-weight:700;
    }

    /* Colores por semana (sutiles y profesionales) */
    .wk-1 .dia-head{background:#bcd6f1;}
    .wk-2 .dia-head{background:#d6e6f7;}
    .wk-3 .dia-head{background:#cfe9d6;}
    .wk-4 .dia-head{background:#e8d9f2;}

    @media print{
      @page{size:A4 portrait;margin:9mm;}
      body{background:#fff !important;}
      .topbar,.acciones,button,.no-print{display:none !important;}
      .container{padding:0 !important;}
      .pm-wrap{max-width:none !important;margin:0 !important;}
      .month-banner img{height:110px;}
      .month-banner .meta{font-size:12px;padding:5px 7px;}
      .dia-head{padding:6px 7px;font-size:12px;}
      .model-table td{font-size:11px;line-height:1.15;padding:3px 5px;}
      .model-block{break-inside:avoid;page-break-inside:avoid;}
    }
  </style>

<style>
  .topnav{max-width:1100px;margin:12px auto 0;display:flex;flex-wrap:wrap;gap:10px;align-items:center;padding:8px 12px;border:1px solid #e5e7eb;border-radius:12px;background:#fff}
  .topnav a{font-weight:800;text-decoration:none;color:#1a4fa3;font-size:13px}
  @media print{.no-print{display:none!important}}
</style>
</head>
<body class="has-topbar">
  <div id="topbar"></div>

  <div class="container">
    <div id="toastHost"></div>

    <div class="card pad">
      <div class="no-print">
        <div class="section-title">
          <h2 class="h1" style="margin:0;">Programa mensual</h2>
          <span class="pill">Discursos públicos</span>
        </div>
        <div class="muted" style="margin-top:-6px;">Se arma automáticamente con lo que cargaste en <b>Asignaciones</b>.</div>
        <div class="hr"></div>
      </div>

      <div class="grid two no-print">
        <div class="field">
          <div class="label">Mes</div>
          <input class="input" id="mes" type="month" />
        </div>
        <div class="field">
          <div class="label">Acciones</div>
          <div class="row">
            <button class="btn" id="btnCargar" type="button">Cargar</button>
            <button class="btn primary" id="btnPrint" type="button">Imprimir / PDF</button>
          </div>
        </div>
      </div>

      <div id="contenido" class="pm-wrap" style="margin-top:12px;"></div>
    </div>
  </div>

  <script>
  (function(){
    if(!('serviceWorker' in navigator)) return;
    let refreshing = false;
    window.addEventListener('load', function(){
      navigator.serviceWorker.register('./sw.js').then(function(reg){
        if(reg.waiting) reg.waiting.postMessage({type:'SKIP_WAITING'});
        reg.addEventListener('updatefound', function(){
          var nw = reg.installing;
          if(!nw) return;
          nw.addEventListener('statechange', function(){
            if(nw.state === 'installed' && navigator.serviceWorker.controller){
              nw.postMessage({type:'SKIP_WAITING'});
            }
          });
        });
      }).catch(function(e){
        console.log('SW error', e);
      });

      navigator.serviceWorker.addEventListener('controllerchange', function(){
        if(refreshing) return;
        refreshing = true;
        location.reload();
      });
    });
  })();
  </script>
  <script type="module" src="js/pages/programa-mensual.js?v=20260302_fix"></script>
</body>
</html>
