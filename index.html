<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1" name="viewport"/>
<title>Acceso · Villa Fiad</title>
<link href="assets/favicon.svg" rel="icon" type="image/svg+xml"/>
<link href="css/styles.css?v=20260429b49" rel="stylesheet"/>
</head>
<body class="login-page">
  <main class="login-shell" aria-label="Inicio de sesión">
    <section class="login-card">
      <div class="login-brand">
        <span class="brand-dot" aria-hidden="true"></span>
        <div>
          <strong>Villa Fiad</strong>
          <span>Discursos y asignaciones</span>
        </div>
      </div>

      <div class="login-header">
        <h1>Acceso</h1>
        <p>Ingresá con tu cuenta autorizada.</p>
      </div>

      <div id="toastHost" class="login-toast"></div>

      <form class="login-form" autocomplete="on">
        <label for="email">Correo</label>
        <input autocomplete="email" class="input" id="email" placeholder="tu@correo.com" type="email" autofocus/>

        <label for="password">Contraseña</label>
        <input autocomplete="current-password" class="input" id="password" placeholder="Contraseña" type="password"/>

        <button class="btn primary login-submit" id="btnLogin" type="button">Entrar</button>
      </form>

      <div class="login-actions">
        <button class="btn ghost" id="btnRegister" type="button">Crear acceso</button>
        <button class="btn ghost" id="btnReset" type="button">Recuperar clave</button>
      </div>

      <a class="login-public" href="public-login.html">Entrar en modo consulta</a>
    </section>
  </main>
<script>
(function(){
  if(!('serviceWorker' in navigator)) return;
  let refreshing = false;
  window.addEventListener('load', function(){
    navigator.serviceWorker.register('./sw.js').then(function(reg){
      if(reg.waiting) reg.waiting.postMessage({type:'SKIP_WAITING'});

      reg.addEventListener('updatefound', function(){
        var nw = reg.installing;
        if(!nw) return;
        nw.addEventListener('statechange', function(){
          if(nw.state === 'installed' && navigator.serviceWorker.controller){
            nw.postMessage({type:'SKIP_WAITING'});
          }
        });
      });
    }).catch(function(e){
      console.log('SW error', e);
    });

    navigator.serviceWorker.addEventListener('controllerchange', function(){
      if(refreshing) return;
      refreshing = true;
      location.reload();
    });
  });
})();
</script><script src="js/index.js?v=20260429b49" type="module"></script>
</body>
</html>
